<!doctype html>
<html lang="fr" data-theme="dark">
<head>
  <script>
    // Early theme application to prevent FOUC
    (function() {
      try {
        var saved = localStorage.getItem('ecsf-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
      } catch(e) {}
    })();
  </script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1280" />
  <title>e-CSF Manager — Simulation interactive</title>
  <meta name="description" content="Cockpit de conformité CSF — Simulation produit" />
  <link rel="icon" type="image/png" href="https://msolutionsai.github.io/e-csf-manager/img/logo-dark.png" />

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>
  <div id="modal-root"></div>
  <div id="toast-root" class="toasts"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
